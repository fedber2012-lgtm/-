<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Свояк — TV Edition</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Свояк — TV Edition</h1>
        <p id="homeStats" class="muted"></p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary" id="goHomeBtn">Главная</button>
      </div>
    </header>

    <main>
      <section id="homeScreen" class="screen active panel">
        <div class="panel-header">
          <h2>Главное меню</h2>
        </div>
        <div class="panel-body home-grid">
          <button class="big-action gold" id="goCreateQuiz">Создать викторину</button>
          <button class="big-action blue" id="goAddTopic">Добавить тему</button>
        </div>
      </section>

      <section id="addTopicScreen" class="screen panel">
        <div class="panel-header">
          <h2>Добавить тему</h2>
          <button class="btn btn-secondary back-home">Назад</button>
        </div>
        <div class="panel-body">
          <form id="topicForm" class="topic-form">
            <div class="field full">
              <label for="theme_name">Название темы</label>
              <input id="theme_name" required placeholder="Например, Космос" />
            </div>

            <div class="qa-grid">
              <div class="cost-badge">100</div>
              <div class="field">
                <label for="q100">Вопрос за 100</label>
                <textarea id="q100" required></textarea>
              </div>
              <div class="field">
                <label for="a100">Ответ за 100</label>
                <textarea id="a100" required></textarea>
              </div>

              <div class="cost-badge">200</div>
              <div class="field">
                <label for="q200">Вопрос за 200</label>
                <textarea id="q200" required></textarea>
              </div>
              <div class="field">
                <label for="a200">Ответ за 200</label>
                <textarea id="a200" required></textarea>
              </div>

              <div class="cost-badge">300</div>
              <div class="field">
                <label for="q300">Вопрос за 300</label>
                <textarea id="q300" required></textarea>
              </div>
              <div class="field">
                <label for="a300">Ответ за 300</label>
                <textarea id="a300" required></textarea>
              </div>

              <div class="cost-badge">400</div>
              <div class="field">
                <label for="q400">Вопрос за 400</label>
                <textarea id="q400" required></textarea>
              </div>
              <div class="field">
                <label for="a400">Ответ за 400</label>
                <textarea id="a400" required></textarea>
              </div>

              <div class="cost-badge">500</div>
              <div class="field">
                <label for="q500">Вопрос за 500</label>
                <textarea id="q500" required></textarea>
              </div>
              <div class="field">
                <label for="a500">Ответ за 500</label>
                <textarea id="a500" required></textarea>
              </div>
            </div>

            <div class="row">
              <button class="btn btn-gold" type="submit" id="saveTopicBtn">Сохранить тему</button>
              <button class="btn btn-secondary" type="button" id="cancelEditBtn" hidden>Отменить редактирование</button>
            </div>
            <div class="status" id="topicStatus"></div>
          </form>
        </div>
      </section>

      <section id="selectTopicsScreen" class="screen panel">
        <div class="panel-header">
          <h2>Выбор тем</h2>
          <div id="topicsCounter" class="muted"></div>
        </div>
        <div class="panel-body">
          <div class="toolbar">
            <input id="themeSearch" class="search" placeholder="Поиск тем" />
            <div class="row">
              <button class="btn btn-secondary" id="exportJsonBtn">Экспорт JSON</button>
              <label class="btn btn-secondary import-btn">
                Импорт JSON
                <input type="file" id="importJsonInput" accept=".json,application/json" hidden />
              </label>
            </div>
          </div>

          <div id="topicsList" class="topics-list"></div>

          <div class="row mt16">
            <button class="btn btn-gold" id="buildQuizBtn">Создать викторину</button>
            <button class="btn btn-secondary back-home">Назад</button>
          </div>
          <div class="status" id="selectStatus"></div>
        </div>
      </section>

      <section id="quizScreen" class="screen panel">
        <div class="panel-header">
          <h2>Игровое поле</h2>
          <div id="quizInfo" class="muted"></div>
        </div>
        <div class="panel-body">
          <section class="teams-panel">
            <div class="teams-header">
              <h3>Команды</h3>
              <div class="row">
                <button class="btn btn-secondary" id="addTeamBtn">Добавить команду</button>
                <button class="btn btn-secondary" id="resetScoresBtn">Сбросить счёт</button>
              </div>
            </div>
            <div id="teamsList" class="teams-list"></div>
          </section>

          <section class="tv-board-wrap">
            <div id="quizBoard" class="quiz-board"></div>
          </section>

          <div class="row mt16">
            <button class="btn btn-secondary" id="resetUsedBtn">Сбросить сыгранные клетки</button>
            <button class="btn btn-secondary" id="backToSelectBtn">Назад к выбору тем</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="questionOverlay" class="overlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div id="modalTheme" class="muted"></div>
          <div id="modalPoints" class="modal-points"></div>
        </div>
        <div class="timer-box">
          <div class="timer-label">Таймер</div>
          <div id="timerValue" class="timer-value">30</div>
        </div>
      </div>

      <div id="modalQuestion" class="modal-question"></div>

      <div id="answerBox" class="answer-box">
        <div class="answer-title">Правильный ответ</div>
        <div id="modalAnswer" class="answer-text"></div>
      </div>

      <div class="row center mt16">
        <button class="btn btn-gold" id="startTimerBtn">Старт таймера</button>
        <button class="btn btn-secondary" id="stopTimerBtn">Стоп</button>
        <button class="btn btn-secondary" id="showAnswerBtn">Показать ответ</button>
        <button class="btn btn-secondary" id="markUsedBtn">Пометить как сыгранный</button>
        <button class="btn btn-danger" id="closeModalBtn">Закрыть</button>
      </div>

      <div class="score-award mt16">
        <div class="muted">Начислить очки команде:</div>
        <div id="awardButtons" class="award-buttons"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
